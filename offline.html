<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonar Rock - Sin conexión</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }

    .wrap {
      max-width: 420px;
    }

    img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 18px;
      box-shadow: 0 0 30px rgba(255, 106, 0, 0.35);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 12px;
      color: #ff6a00;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #ddd;
    }

    .btn {
      display: inline-block;
      margin-top: 24px;
      background: #ff6a00;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      padding: 12px 18px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/attached_assets/logo_1749601460841.jpeg" alt="Sonar Rock">
    <h1>Sin conexión</h1>
    <p>
      No hay internet en este momento.  
      Cuando regreses a la red, Sonar Rock volverá a rugir.
    </p>
    <a class="btn" href="/">Reintentar</a>
  </div>
</body>
</html>
